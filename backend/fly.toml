app = "jira-agent-backend"
primary_region = "sin"

[build]

[env]
  DATA_DIR = "/app/data"
  GROQ_MODEL = "llama-3.3-70b-versatile"

[mounts]
  source = "agent_data"
  destination = "/app/data"

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"
